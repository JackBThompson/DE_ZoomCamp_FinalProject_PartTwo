version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET: ${GCS_BUCKET}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    SPARK_HOME: /opt/spark
  volumes:
    - /home/codespace/DE_ZoomCamp_FinalProject_PartTwo/airflow/dags:/opt/airflow/dags
    - /home/codespace/DE_ZoomCamp_FinalProject_PartTwo/data/raw:/opt/airflow/data/raw
    - /home/codespace/DE_ZoomCamp_FinalProject_PartTwo/dbt:/opt/airflow/dbt
    - /home/codespace/DE_ZoomCamp_FinalProject_PartTwo/spark:/opt/airflow/spark
    - /home/codespace/DE_ZoomCamp_FinalProject_PartTwo/gcp-key.json:/opt/airflow/gcp-key.json
    - /home/codespace/spark-3.5.1-bin-hadoop3:/opt/spark
    - /home/codespace/gcs-connector-hadoop3-latest.jar:/opt/spark/jars/gcs-connector-hadoop3-latest.jar
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init &&
               airflow users create
               --username admin
               --firstname Admin
               --lastname User
               --role Admin
               --email admin@example.com
               --password admin"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres-db:
  airflow-logs:
